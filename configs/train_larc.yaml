code_revision: ${oc.env:ACT_LEWM_CODE_REVISION}
defaults:
  - _self_
  - policy: larc_chunk

latent_cache_dir: ${oc.env:ACT_LEWM_CACHE_ROOT}/pusht/frame_latents
output_dir: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/horizon_h50/larc
output_model_name: larc_chunk
seed: 3072

world_model:
  config_path: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/horizon_h50/world_model/model_config.yaml
  weights_path: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/horizon_h50/world_model/fast_lewm_backbone_best.pt

data:
  frameskip: 5
  max_horizon: 10
  max_train_samples: null
  max_validation_samples: 100000

loader:
  batch_size: 26000
  # Tune this starting point for the available GPU before a production run.
  num_workers: 6
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true

optimizer:
  lr: 1e-3
  weight_decay: 1e-4

objective:
  _target_: losses.LARCRolloutConsistencyObjective
  behavior_weight: 1.0
  consistency_weight: 1.0
  frameskip: 5

trainer:
  max_epochs: 50
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  num_sanity_val_steps: 1
  enable_model_summary: false
  enable_progress_bar: false
  log_every_n_steps: 50

wandb:
  enabled: false
  config:
    entity: null
    project: act-leworldmodel
    name: larc-h50-pusht

hydra:
  run:
    dir: ${output_dir}/hydra
