defaults:
  - task: pusht
  - _self_

code_revision: ${oc.env:ACT_LEWM_CODE_REVISION}
latent_cache_dir: ${task.latent_cache_dir}
output_dir: ${task.experiment_dir}/open_loop
seed: 42
device: cuda
max_samples: 100000

data:
  frameskip: 5
  max_horizon: 10

model:
  config_path: ${task.experiment_dir}/world_model/model_config.yaml
  weights_path: ${task.experiment_dir}/world_model/fast_lewm_backbone_best.pt

loader:
  batch_size: 2048
  num_workers: 6
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true

hydra:
  run:
    dir: ${output_dir}/hydra
