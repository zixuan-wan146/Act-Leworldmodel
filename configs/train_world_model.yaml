code_revision: ${oc.env:ACT_LEWM_CODE_REVISION}
defaults:
  - _self_
  - world_model@model: fast_lewm

latent_cache_dir: ${oc.env:ACT_LEWM_CACHE_ROOT}/pusht/frame_latents
output_dir: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/horizon_h50/world_model
output_model_name: fast_lewm_backbone

source_model:
  config_path: configs/released_lewm/pusht.yaml
  weights_path: ${oc.env:PUSHT_LEWM_WEIGHTS}

seed: 3072
image_size: 224
latent_dim: 192
max_horizon: 10
freeze_representation: true
checkpoint_interval: 1

data:
  frameskip: 5
  max_train_samples: null
  max_validation_samples: 100000

loader:
  batch_size: 15000
  # Tune this starting point for the available GPU before a production run.
  num_workers: 6
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true

optimizer:
  lr: 5e-5
  weight_decay: 1e-3

objective:
  _target_: losses.DensePrefixObjective
  # Cached targets are frozen; every one of the ten prefixes has equal weight.

trainer:
  max_epochs: 10
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  num_sanity_val_steps: 1
  enable_model_summary: false
  enable_progress_bar: false
  log_every_n_steps: 50

wandb:
  enabled: false
  config:
    entity: null
    project: act-leworldmodel
    name: fast-lewm-h50-pusht

hydra:
  run:
    dir: ${output_dir}/hydra
