defaults:
  - task: pusht
  - _self_

method: cem
code_revision: ${oc.env:ACT_LEWM_CODE_REVISION}
device: cuda
dataset_path: ${task.dataset_path}
latent_cache_dir: ${task.latent_cache_dir}
experiment_dir: ${task.experiment_dir}
output_dir: ${experiment_dir}/eval/offset_${protocol.goal_offset}
environment: ${task.environment}

protocol:
  training_seed: 3072
  seed: 42
  num_eval: 50
  goal_offset: 25
  goal_offsets: [25, 35, 50]
  budget_multiplier: 2
  eval_budget: 50
  video: false
  manifest_path: ${experiment_dir}/eval/paired_manifest_seed_${protocol.seed}.json

world_model:
  config_path: ${experiment_dir}/world_model/model_config.yaml
  weights_path: ${experiment_dir}/world_model/fast_lewm_backbone_best.pt

cem:
  config_path: ${task.source_model.config_path}
  weights_path: ${task.source_model.weights_path}
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  horizon: 5
  receding_horizon: 1
  action_block: 5
  warm_start: true

gc_idm:
  directory: ${experiment_dir}/gc_idm
  weights: gc_idm_best.pt

larc:
  directory: ${experiment_dir}/larc
  weights: larc_chunk_best.pt
  commit_steps: 5

hydra:
  run:
    dir: ${output_dir}/hydra/${method}
