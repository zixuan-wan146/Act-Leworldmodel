method: cem
code_revision: ${oc.env:ACT_LEWM_CODE_REVISION}
device: cuda
dataset_path: ${oc.env:PUSHT_DATASET_PATH}
latent_cache_dir: ${oc.env:ACT_LEWM_CACHE_ROOT}/pusht/frame_latents
output_dir: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/eval

environment:
  image_size: 224

protocol:
  training_seed: 3072
  seed: 42
  num_eval: 50
  goal_offset: 25
  eval_budget: 50
  video: false
  manifest_path: ${output_dir}/protocol_seed_${protocol.seed}.json

world_model:
  config_path: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/world_model/model_config.yaml
  weights_path: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/world_model/fast_lewm_backbone_best.pt

cem:
  config_path: configs/released_lewm/pusht.yaml
  weights_path: ${oc.env:PUSHT_LEWM_WEIGHTS}
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  horizon: 5
  receding_horizon: 5
  history_len: 3
  action_block: 5
  warm_start: true

gc_idm:
  directory: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/gc_idm
  weights: gc_idm_best.pt
  commit_steps: 1

larc:
  directory: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/larc
  weights: larc_chunk_best.pt
  commit_steps: 5

hydra:
  run:
    dir: ${output_dir}/hydra/${method}
