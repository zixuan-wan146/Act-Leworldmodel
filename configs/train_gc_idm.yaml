defaults:
  - _self_
  - policy: gc_idm

latent_cache_dir: ${oc.env:ACT_LEWM_CACHE_ROOT}/pusht/frame_latents
output_dir: ${oc.env:ACT_LEWM_RUN_ROOT}/pusht/gc_idm
output_model_name: gc_idm
seed: 3072
checkpoint_interval: 5

data:
  frameskip: 5
  max_horizon: 5
  max_train_samples: null
  max_validation_samples: 100000

loader:
  batch_size: 2048
  num_workers: 6
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true

optimizer:
  lr: 1e-3
  weight_decay: 1e-4

objective:
  _target_: losses.GCIDMRegressionObjective

trainer:
  max_epochs: 50
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  num_sanity_val_steps: 1
  enable_model_summary: false
  enable_progress_bar: false
  log_every_n_steps: 50

wandb:
  enabled: false
  config:
    entity: null
    project: act-leworldmodel
    name: gc-idm-pusht

hydra:
  run:
    dir: ${output_dir}/hydra
