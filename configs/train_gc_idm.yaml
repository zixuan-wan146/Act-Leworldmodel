defaults:
  - task: pusht
  - _self_
  - policy: gc_idm

code_revision: ${oc.env:ACT_LEWM_CODE_REVISION}
latent_cache_dir: ${task.latent_cache_dir}
output_dir: ${task.experiment_dir}/gc_idm
output_model_name: gc_idm
seed: 3072

data:
  frameskip: 5
  max_horizon: 10
  max_train_samples: null
  max_validation_samples: 100000

loader:
  batch_size: ${task.training.gc_idm_batch_size}
  # Task-specific value stays below the H50 train-anchor count for drop_last.
  num_workers: 1
  persistent_workers: true
  prefetch_factor: 1
  pin_memory: true

optimizer:
  lr: 1e-3
  weight_decay: 1e-4

objective:
  _target_: losses.GCIDMRegressionObjective

trainer:
  max_epochs: 100
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  num_sanity_val_steps: 1
  enable_model_summary: false
  enable_progress_bar: false
  log_every_n_steps: 50

wandb:
  enabled: false
  config:
    entity: null
    project: act-leworldmodel
    name: gc-idm-h50-${task.name}

hydra:
  run:
    dir: ${output_dir}/hydra
