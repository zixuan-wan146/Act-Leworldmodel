defaults:
  - _self_
  - policy: gc_idm

latent_cache: ???
output_dir: outputs/checkpoints/gc_idm
output_model_name: gc_idm
seed: 42
train_split: 0.9
checkpoint_interval: 1

loader:
  batch_size: 1024
  num_workers: 4
  persistent_workers: true
  pin_memory: true

optimizer:
  lr: 1e-3
  weight_decay: 1e-4

objective:
  _target_: losses.GCIDMRegressionObjective

trainer:
  max_epochs: 50
  devices: auto
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0

wandb:
  enabled: false
  config:
    entity: null
    project: act-leworldmodel
    name: gc-idm
